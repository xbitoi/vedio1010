name: Deploy to GitHub Pages

on:
  # يشتغل تلقائياً عند رفع أي تعديل على فرع main أو master
  push:
    branches:
      - main
      - master
  # يسمح لك بتشغيل السكربت يدوياً من واجهة GitHub
  workflow_dispatch:

# إعطاء الصلاحيات اللازمة لرفع الملفات إلى GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# منع تشغيل أكثر من عملية بناء في نفس الوقت
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 1. مرحلة البناء (Build)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install
        
      - name: Build project
        run: npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # 2. مرحلة النشر (Deploy)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
